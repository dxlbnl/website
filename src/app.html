<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/logo.svg" type="image/svg+xml" />
		<link rel="alternate icon" href="%sveltekit.assets%/logo.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/logo.png" />
		%sveltekit.head%
		<script>
			try {
				let theme = localStorage.getItem('dxlb-palette');
				if (!theme) {
					theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'phosphor' : 'paper';
				}
				document.documentElement.dataset.palette = theme;
			} catch (e) {}
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
